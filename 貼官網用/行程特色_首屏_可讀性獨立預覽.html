<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>首屏副標可讀性｜獨立預覽（非正式版）</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&amp;family=Noto+Sans+TC:wght@700;900&amp;family=Noto+Serif+TC:ital,wght@0,400;0,600;1,400&amp;display=swap" rel="stylesheet"/>
<style>
/* 僅供本預覽：與官網內嵌版分離，可隨意調整襯底／霧化／陰影 */
html,body{margin:0;padding:0;background:#efeae3;}
#pe55-cms-safe-root{position:relative;isolation:isolate;width:100%;max-width:100%;box-sizing:border-box;overflow-x:hidden;}
#pe55-root,#pe55-root *{box-sizing:border-box;}
#pe55-root{
  /* 第二版：輕霧面＋暖灰漸層，避免「黑盒子」；可讀性靠柔化陰影＋略提亮字底 */
  --rx-stack-blur:22px;
  --rx-line-shadow:
    0 1px 2px rgba(0,0,0,.42),
    0 2px 14px rgba(0,0,0,.28),
    0 0 1px rgba(0,0,0,.35);
  position:relative;width:100%;margin:0;padding:0;
  color:#2a2622;font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;
  -webkit-font-smoothing:antialiased;
}
#pe55-root .pe55-ff{font-family:"Noto Serif TC",Georgia,serif;}

#pe55-root .pe55-hero{
  position:relative;margin:0;width:100%;
  min-height:clamp(420px,88vh,980px);
  display:flex;align-items:flex-start;justify-content:flex-start;
  overflow:visible;
}
#pe55-root .pe55-hero::after{
  content:"";position:absolute;left:0;right:0;bottom:0;height:clamp(56px,11vh,140px);z-index:2;pointer-events:none;
  background:linear-gradient(to bottom,rgba(250,249,246,0) 0,rgba(250,249,246,0) 40%,rgba(244,241,235,.5) 66%,rgba(235,230,223,.88) 86%,#efeae3 100%);
}
#pe55-root .pe55-hero-bg{position:absolute;inset:0;z-index:0;overflow:hidden;background:#2a2624;}
#pe55-root .pe55-hero-bg img{
  width:100%;height:100%;object-fit:cover;object-position:50% 100%;
  display:block;transform:scale(1);transform-origin:50% 88%;
  filter:brightness(1.12) saturate(1.05);backface-visibility:hidden;
}
#pe55-root.pe55-hero-revealed .pe55-hero-bg img{
  animation:pe55-hero-bg-zoom 18s cubic-bezier(.2,.06,.12,1) forwards;
}
/* 預覽版：左側僅微壓暗，讓照片仍主導畫面 */
#pe55-root.pe55-hero-rx-standalone .pe55-hero-scrim{
  background:
    radial-gradient(130% 95% at 22% 38%,rgba(0,0,0,.12) 0,rgba(30,26,22,.05) 55%,transparent 78%),
    linear-gradient(108deg,rgba(18,14,12,.2) 0,rgba(18,14,12,.06) 48%,rgba(18,14,10,.04) 100%);
}
#pe55-root:not(.pe55-hero-rx-standalone) .pe55-hero-scrim{
  position:absolute;inset:0;z-index:1;pointer-events:none;
  background:radial-gradient(120% 85% at 24% 34%,rgba(20,16,12,0) 0,rgba(20,16,12,.06) 52%,rgba(20,16,12,.16) 100%),
    linear-gradient(112deg,rgba(18,14,10,.12) 0,rgba(18,14,10,.04) 38%,rgba(18,14,10,.14) 100%);
}
#pe55-root.pe55-hero-rx-standalone .pe55-hero-scrim{
  position:absolute;inset:0;z-index:1;pointer-events:none;
}

#pe55-root .pe55-hero-inner{
  position:relative;z-index:3;max-width:min(44rem,94vw);
  margin:clamp(1rem,3vw,2rem) 0 0 clamp(1rem,4vw,3.5rem);
  padding:clamp(.35rem,1vw,.65rem) clamp(.25rem,1vw,.5rem) 0 0;
  text-align:left;
}
#pe55-root .pe55-hero-logo-wrap{margin:0 0 clamp(.35rem,1.2vw,.55rem);}
#pe55-root .pe55-hero-logo{
  display:block;width:clamp(71px,23.2vw,128px);height:auto;
  filter:drop-shadow(0 2px 12px rgba(0,0,0,.5)) drop-shadow(0 0 2px rgba(0,0,0,.35));
}
@media (min-width:900px){#pe55-root .pe55-hero-logo{width:clamp(80px,10.4vw,120px);}}

#pe55-root .pe55-hero-kicker{
  margin:0 0 .5rem;font-family:Caveat,cursive;
  font-size:clamp(1.76rem,3.38vw,2.41rem);font-weight:700;
  letter-spacing:.04em;color:rgba(245,238,228,.98);
  text-shadow:0 1px 2px rgba(0,0,0,.45),0 2px 10px rgba(0,0,0,.38);
  opacity:0;transform:translate3d(0,clamp(14px,2.4vh,32px),0);
}
#pe55-root .pe55-hero-title{
  margin:0 0 .72rem;font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;
  font-size:clamp(2.4rem,5.8vw,3.8rem);font-weight:900;letter-spacing:.08em;line-height:1.18;
  color:#fff;text-wrap:balance;
  text-shadow:0 1px 2px rgba(0,0,0,.72),0 4px 16px rgba(0,0,0,.48);
  opacity:0;transform:translate3d(clamp(-3rem,-14vw,-.65rem),0,0);filter:blur(3px);
  transform-origin:left center;will-change:transform,opacity,filter;
}

#pe55-root .pe55-hero-sub{
  margin:0;font-size:clamp(1.42rem,2.65vw,1.72rem);font-weight:700;letter-spacing:.08em;line-height:1.55;
  color:#fff;text-align:left;
  text-shadow:0 1px 2px rgba(0,0,0,.68),0 3px 12px rgba(0,0,0,.48);
}
#pe55-root .pe55-hero-sub-stack{
  display:flex;flex-direction:column;gap:.42em;align-items:flex-start;
  min-width:0;max-width:100%;
}
/* —— 副標：輕玻璃感襯底（暖灰漸層＋高斯霧化＋細金線），可讀但不搶戲 —— */
#pe55-root.pe55-hero-rx-standalone .pe55-hero-sub-stack{
  position:relative;
  gap:.5em;
  padding:clamp(.75rem,1.8vw,1.1rem) clamp(1rem,2.4vw,1.5rem) clamp(.75rem,1.8vw,1.1rem) clamp(1.1rem,2.6vw,1.65rem);
  max-width:min(100%,36.5em);
  border-radius:clamp(14px,1.5vw,18px);
  border:1px solid rgba(255,255,255,.11);
  background:
    linear-gradient(165deg,rgba(255,252,248,.1) 0%,rgba(32,28,24,.22) 45%,rgba(18,15,13,.34) 100%);
  -webkit-backdrop-filter:blur(var(--rx-stack-blur)) saturate(1.12);
  backdrop-filter:blur(var(--rx-stack-blur)) saturate(1.12);
  box-shadow:
    0 4px 28px rgba(12,10,8,.14),
    0 1px 0 rgba(255,255,255,.1) inset,
    inset 0 -1px 0 rgba(0,0,0,.06);
}
#pe55-root.pe55-hero-rx-standalone .pe55-hero-sub-stack::before{
  content:"";
  position:absolute;left:0;top:clamp(10px,2vw,14px);bottom:clamp(10px,2vw,14px);
  width:3px;border-radius:2px;
  background:linear-gradient(180deg,rgba(184,148,42,.85) 0%,rgba(184,148,42,.35) 100%);
  box-shadow:0 0 12px rgba(184,148,42,.25);
  pointer-events:none;
}
#pe55-root .pe55-hero-sub-line{
  display:block;max-width:100%;font-size:inherit;font-weight:inherit;
  line-height:1.55;letter-spacing:inherit;color:inherit;
  opacity:0;transform:translate3d(0,.22em,0);will-change:opacity,transform;
}
#pe55-root.pe55-hero-rx-standalone .pe55-hero-sub-line{
  color:rgba(255,253,250,.98);
  text-shadow:var(--rx-line-shadow);
  font-weight:700;
  letter-spacing:.07em;
}

#pe55-root.pe55-hero-revealed .pe55-hero-kicker{
  animation:pe55-hero-in 1.45s cubic-bezier(.19,.92,.35,1) .08s forwards;
}
#pe55-root.pe55-hero-revealed .pe55-hero-title{
  animation:pe55-hero-title-fly-l 1.38s cubic-bezier(.18,.72,.22,1) .2s forwards;
}
#pe55-root.pe55-hero-revealed .pe55-hero-sub-line--1{
  animation:pe55-hero-line-fade .95s cubic-bezier(.22,.61,.16,1) 1.12s forwards;
}
#pe55-root.pe55-hero-revealed .pe55-hero-sub-line--2{
  animation:pe55-hero-line-fade .95s cubic-bezier(.22,.61,.16,1) 2.05s forwards;
}

@keyframes pe55-hero-bg-zoom{from{transform:scale(1)}to{transform:scale(1.1)}}
@keyframes pe55-hero-in{
  from{opacity:0;transform:translate3d(0,clamp(14px,2.4vh,32px),0)}
  to{opacity:1;transform:translate3d(0,0,0)}
}
@keyframes pe55-hero-title-fly-l{
  0%{opacity:0;transform:translate3d(clamp(-3rem,-14vw,-.65rem),0,0);filter:blur(3px)}
  55%{opacity:1;filter:blur(0)}
  100%{opacity:1;transform:translate3d(0,0,0);filter:blur(0)}
}
@keyframes pe55-hero-line-fade{
  from{opacity:0;transform:translate3d(0,.22em,0)}
  to{opacity:1;transform:translate3d(0,0,0)}
}

@media (prefers-reduced-motion:reduce){
  #pe55-root.pe55-hero-revealed .pe55-hero-bg img{animation:none!important;transform:none!important;}
  #pe55-root .pe55-hero-kicker,#pe55-root .pe55-hero-title,#pe55-root .pe55-hero-sub-line--1,#pe55-root .pe55-hero-sub-line--2{
    animation:none!important;opacity:1!important;transform:none!important;filter:none!important;
  }
}

@media (max-width:900px){
  #pe55-root .pe55-hero{min-height:clamp(380px,78vh,720px);}
  #pe55-root .pe55-hero-inner{margin:clamp(.75rem,3vw,1.15rem) clamp(.75rem,3vw,1.25rem) 0;max-width:100%;padding-left:0;}
}

.rx-note{
  max-width:min(44rem,94vw);margin:0 auto;padding:1rem clamp(1rem,4vw,3.5rem) 2rem;
  font-size:.95rem;line-height:1.65;color:#575045;background:#efeae3;
}
.rx-note code{font-size:.85em;background:rgba(0,0,0,.06);padding:.1em .35em;border-radius:4px;}
</style>
</head>
<body>
<div id="pe55-cms-safe-root">
<!-- 加類別 pe55-hero-rx-standalone：啟用副標襯底與加強陰影；若移除則可對照「僅依賴全幅 scrim」 -->
<div id="pe55-root" class="pe55-ff pe55-hero-rx-standalone pe55-hero-revealed" lang="zh-Hant">
<section class="pe55-hero" aria-labelledby="pe55-hero-title">
<div class="pe55-hero-bg"><img src="https://www.tcawg.com/data/images/202604/Peru/M7.jpg" alt="" decoding="async" fetchpriority="high"/></div>
<div class="pe55-hero-scrim" aria-hidden="true"></div>
<div class="pe55-hero-inner pe55-ff">
<div class="pe55-hero-copy">
<div class="pe55-hero-logo-wrap"><img class="pe55-hero-logo" src="https://www.tcawg.com/data/images/202604/Peru/55%E5%91%A8%E5%B9%B4logo.png" alt="55週年慶" width="240" height="104" decoding="async"/></div>
<p class="pe55-hero-kicker">Inti · Chakana · Tahuantinsuyu</p>
<h2 id="pe55-hero-title" class="pe55-hero-title">走進印加帝國的傳奇</h2>
<p class="pe55-hero-sub" aria-label="行程重點：納斯卡線、的的喀喀湖、布蘭卡島、蘆葦浮島；祕魯馬丘比丘、亞馬遜雨林、全景觀光列車、15日"><span class="pe55-hero-sub-stack" aria-hidden="true"><span class="pe55-hero-sub-line pe55-hero-sub-line--1">納斯卡線 的的喀喀湖 布蘭卡島 蘆葦浮島</span><span class="pe55-hero-sub-line pe55-hero-sub-line--2">祕魯馬丘比丘 亞馬遜雨林 全景觀光列車 15日</span></span></p>
</div>
</div>
</section>
</div>
</div>
<p class="rx-note" role="note">
<strong>獨立預覽說明（非官網正式檔）：</strong><br/>
第二版視覺：副標改為<strong>暖灰漸層＋較輕霧化</strong>（避免厚重黑塊）、柔化字陰影、左側<strong>細金線</strong>呼應品牌色；全幅 <code>scrim</code> 僅微壓暗，讓照片仍為主角。<br/>
可調：<code>--rx-stack-blur</code>、<code>--rx-line-shadow</code>（檔案頂端 <code>#pe55-root</code>）。對照無襯底請看 <code>行程特色_開發版.html</code>。
</p>
<script>
(function(){
var r=document.getElementById("pe55-root");
if(!r)return;
/* 正式版用捲動觸發；本預覽預設已加 pe55-hero-revealed，此段僅在移除 class 時補上 */
if(r.classList.contains("pe55-hero-revealed"))return;
var h=r.querySelector(".pe55-hero");
if(!h)return;
function reveal(){r.classList.add("pe55-hero-revealed");}
if(!("IntersectionObserver"in window)){reveal();return;}
var io=new IntersectionObserver(function(entries){
entries.forEach(function(e){if(e.isIntersecting){reveal();io.disconnect();}});
},{threshold:0.18,rootMargin:"0px 0px -6% 0px"});
io.observe(h);
})();
</script>
</body>
</html>
